---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: twingate
spec:
  interval: 1h
  chart:
    spec:
      chart: connector
      version: 0.1.35
      sourceRef:
        kind: HelmRepository
        name: twingate
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: docker.io/twingate/connector
      tag: 1.89.0@sha256:303f4dfc3ee3af1fe4023a5eead95e8f903ae848ca55cc9a21132133ae081698
      pullPolicy: IfNotPresent
    connector:
      logLevel: "info"
      network: "goatsinapond"
      url: "twingate.com"
      existingSecret: twingate-secret
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/instance: twingate-backup
