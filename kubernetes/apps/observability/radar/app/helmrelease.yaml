---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radar
spec:
  interval: 1h
  chart:
    spec:
      chart: radar
      version: 1.8.5
      sourceRef:
        kind: HelmRepository
        name: skyhook
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      tag: 1.8.0@sha256:95a2b4391420e69a30b12e1273f659a2376bd5887c4fa2f24ea961a0ebff2bb4
    rbac:
      # Hubble relay isn't deployed yet (cilium hubble.enabled: false) - no traffic
      # map source to read. Flip to true once Hubble is enabled cluster-wide.
      traffic: false
