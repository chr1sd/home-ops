---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radar
spec:
  interval: 1h
  chart:
    spec:
      chart: radar
      version: 1.8.5
      sourceRef:
        kind: HelmRepository
        name: skyhook
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: ghcr.io/skyhook-io/radar
      tag: 1.8.6@sha256:981ce41afe549a3acaffa7ffc791ae537e4ac9503c03723edda6ad0885cb9e23
    rbac:
      # Hubble relay isn't deployed yet (cilium hubble.enabled: false) - no traffic
      # map source to read. Flip to true once Hubble is enabled cluster-wide.
      traffic: false
