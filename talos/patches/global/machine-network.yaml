machine:
  network:
    interfaces:
    - interface: bond0
      bond:
        deviceSelectors:
          - driver: igc
            hardwareAddr: 02:26:26:*
        mode: active-backup
      dhcp: true
      mtu: 1500
      vlans:
        - # VPN
          vlanId: 87
          dhcp: false
          mtu: 1500
    disableSearchDomain: true
    nameservers:
      - 1.1.1.1
      - 1.0.0.1
