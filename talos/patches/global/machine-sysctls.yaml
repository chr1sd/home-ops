machine:
  sysctls:
    fs.inotify.max_user_instances: "8192" # Watchdog
    fs.inotify.max_user_watches: "1048576" # Watchdog
    net.core.default_qdisc: "fq" # 10Gb/s
    net.core.netdev_max_backlog: "50000" # 10Gb/s
    net.core.rmem_max: "67108864" # 10Gb/s | Cloudflared / QUIC
    net.core.somaxconn: "65535" # 10Gb/s
    net.core.wmem_max: "67108864" # 10Gb/s | Cloudflared / QUIC
    net.ipv4.ip_local_port_range: "1024 65535" # Increase port ranges
    net.ipv4.neigh.default.gc_thresh1: "4096" # Prevent ARP cache overflows
    net.ipv4.neigh.default.gc_thresh2: "8192" # Prevent ARP cache overflows
    net.ipv4.neigh.default.gc_thresh3: "16384" # Prevent ARP cache overflows
    net.ipv4.ping_group_range: "0 2147483647" # Ping non-root
    net.ipv4.tcp_congestion_control: "bbr" # 10Gb/s
    net.ipv4.tcp_fastopen: "3" # SYN packet data
    net.ipv4.tcp_fin_timeout: "15" # Faster timeouts
    net.ipv4.tcp_max_syn_backlog: "65535" # 10Gb/s
    net.ipv4.tcp_mtu_probing: "1" # 10Gb/s | Jumbo frames
    net.ipv4.tcp_notsent_lowat: "131072" # 10Gb/s
    net.ipv4.tcp_rmem: "4096 131072 67108864" # 10Gb/s
    net.ipv4.tcp_slow_start_after_idle: "0" # 10Gb/s
    net.ipv4.tcp_tw_reuse: "1" # Reuse TIME_WAIT sockets
    net.ipv4.tcp_window_scaling: "1" # 10Gb/s
    net.ipv4.tcp_wmem: "4096 16384 67108864" # 10Gb/s
    sunrpc.tcp_max_slot_table_entries: "128" # 10Gb/s | NFS
    sunrpc.tcp_slot_table_entries: "128" # 10Gb/s | NFS
    user.max_user_namespaces: "11255" # User Namespaces
